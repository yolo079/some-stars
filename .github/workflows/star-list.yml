name: Update some list

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    -  # Execute every week at 0:00 CST (UTC+8), which is 16:00 UTC on the previous day
    -
    - # Operator  | Description                   | Example
    - # *         | Any value                     |  15 * * * * runs at every minute 15 of every hour of every day.
    - # ,         | Value list separator          | 2,10 4,5 * * * runs at minute 2 and 10 of the 4th and 5th hour of every day.
    - # -         | Range of values 30            | 4-6 * * * runs at minute 30 of the 4th, 5th, and 6th hour.
    - # /         | Step values                   | 20/15 * * * * runs every 15 minutes starting from minute 20 through 59 (minutes 20, 35, and 50).
    - #      ┌───────────── minute (0 - 59)
    - #      │ ┌───────────── hour (0 - 23)
    - #      │ │ ┌───────────── day of the month (1 - 31)
    - #      │ │ │ ┌───────────── month (1 - 12 or JAN-DEC)
    - #      │ │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
    - #      │ │ │ │ │
    - #      │ │ │ │ │
    - #      │ │ │ │ │
    - #      * * * * *
    - cron: '0 7 */2 * *' # This runs at 16:00 UTC on Saturday, which is 0:00 CST on Sunday
  watch:
    types: [started]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps for local generator
        run: npm ci
        working-directory: ./tools/mawesome

      - name: Generate README from template
        run: |
          node ./tools/mawesome/index.js \
            --template ./template/README.ejs \
            --github-name "${{ github.repository_owner }}" \
            --out README.md
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}

      - name: Commit and push changes
        run: |
          git config user.name "${{ github.repository_owner }}"
          # prefer provided USER_EMAIL secret; fall back to actor noreply
          if [ -n "${{ secrets.USER_EMAIL }}" ]; then
            git config user.email "${{ secrets.USER_EMAIL }}"
          else
            git config user.email "${{ github.actor }}@users.noreply.github.com"
          fi
          git add README.md || true
          if ! git diff --quiet --cached; then
            git commit -m "chore: update generated README"
            git push
          else
            echo "No changes to commit"
          fi
